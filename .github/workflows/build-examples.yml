name: Build examples

# Compile every example entrypoint so the demos can't silently rot when the
# library API changes. Runs on the typst-dual-format repo's own pushes/PRs.
on: [push, pull_request]

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
      - name: Compile example entrypoints
        run: |
          shopt -s nullglob
          status=0
          for f in examples/*_document.typ examples/*_slides.typ; do
            echo "::group::$f"
            if typst compile --root . -f pdf "$f" /dev/null; then
              echo "ok: $f"
            else
              echo "::error file=$f::failed to compile"
              status=1
            fi
            echo "::endgroup::"
          done
          exit $status
